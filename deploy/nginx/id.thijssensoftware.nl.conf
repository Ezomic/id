# nginx server block for id.thijssensoftware.nl
# Install to /etc/nginx/sites-available/id.thijssensoftware.nl and symlink into
# sites-enabled. TLS is served from the shared certbot lineage ("shared"); add
# id.thijssensoftware.nl to that cert BEFORE enabling this block (see
# deploy/PROVISION.md).

server {
    listen 80;
    listen [::]:80;
    server_name id.thijssensoftware.nl;

    # Allow HTTP-01 renewals, redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name id.thijssensoftware.nl;

    root /home/deploy/id/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/shared/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shared/privkey.pem;

    charset utf-8;
    client_max_body_size 20M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # Default php8.4-fpm pool. Confirm the socket path on the droplet
        # (ls /run/php/) and swap to a dedicated id pool if you provision one.
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/id-access.log;
    error_log  /var/log/nginx/id-error.log;
}
